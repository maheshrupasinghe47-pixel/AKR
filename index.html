<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKR EXPRESS | Seat Booking</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #C41E3A; --bg: #0f172a; --card: #ffffff; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #f8fafc; padding-bottom: 100px; }
        header { background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); padding: 20px; text-align: center; border-bottom: 3px solid var(--accent); position: sticky; top: 0; z-index: 1000; }
        .logo { font-family: 'Orbitron', sans-serif; font-size: 24px; color: white; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .glass-card { background: var(--card); color: #1e293b; border-radius: 20px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); margin-bottom: 20px; }
        h3 { font-size: 14px; color: var(--accent); margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 8px; }
        label { font-size: 11px; font-weight: 700; color: #64748b; display: block; margin: 12px 0 5px; }
        select, input { width: 100%; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 14px; box-sizing: border-box; }
        
        /* Bus Interior */
        .bus-interior { background: #f1f5f9; border-radius: 40px 40px 20px 20px; padding: 30px 15px; border: 4px solid #cbd5e1; position: relative; }
        .driver-area { display: flex; justify-content: flex-end; padding-bottom: 20px; border-bottom: 2px dashed #cbd5e1; margin-bottom: 20px; }
        .steering { width: 45px; transform: rotate(-20deg); }
        
        .seat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
        .seat-grid div:nth-child(4n-2) { margin-right: 30px; } /* Aisle space */
        
        .seat { aspect-ratio: 1/1; border: 2px solid #94a3b8; border-radius: 8px; background: white; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; cursor: pointer; transition: 0.2s; }
        .seat.selected { background: #10b981 !important; color: white; border-color: #059669; }
        .seat.booked { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; border-color: #cbd5e1; }
        
        .back-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 15px; }

        .footer { position: fixed; bottom: 0; left: 0; right: 0; background: white; padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 -5px 20px rgba(0,0,0,0.2); }
        .btn-group { display: flex; flex-direction: column; gap: 5px; }
        .btn-book { background: var(--accent); color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: 800; cursor: pointer; }
        .btn-card { background: var(--primary); color: white; border: none; padding: 8px 25px; border-radius: 10px; font-size: 11px; font-weight: 600; cursor: pointer; }
    </style>
</head>
<body onload="init()">

<header>
    <h1 class="logo">AKR EXPRESS</h1>
</header>

<div class="container">
    <div class="glass-card">
        <h3>📍 Journey</h3>
        <label>FROM</label>
        <select id="f" onchange="up()">
            <option value="Colombo">Colombo</option>
            <option value="Mannar">Mannar</option>
        </select>
        <label>TO</label>
        <select id="t" onchange="up()">
            <option value="Mannar">Mannar</option>
            <option value="Colombo">Colombo</option>
        </select>
        <div style="text-align: center; margin-top: 15px; font-weight: 800; color: #9f1239;">
            Rs. <span id="pv">1790</span>
        </div>
    </div>

    <div class="glass-card">
        <h3>🚌 Seats (Driver Behind)</h3>
        <div class="bus-interior">
            <div class="driver-area">
                <img class="steering" src="https://cdn-icons-png.flaticon.com/512/744/744465.png">
            </div>
            <div class="seat-grid" id="mg"></div>
            <div class="back-row" id="bg"></div>
        </div>
    </div>
</div>

<div class="footer">
    <div>
        <div id="sc" style="font-size: 11px; color: #64748b;">0 SEATS SELECTED</div>
        <div id="tp" style="font-size: 20px; font-weight: 800; color: var(--primary);">Rs. 0</div>
    </div>
    <div class="btn-group">
        <button class="btn-book" onclick="bk()">WhatsApp Book</button>
        <button class="btn-card" onclick="alert('Card Payment Coming Soon!')">Pay by Card</button>
    </div>
</div>

<script>
    let sl = [];
    const pricePerSeat = 1790;

    function init() {
        const m = document.getElementById('mg'), b = document.getElementById('bg');
        // Layout: 1-32 seats
        for(let i=1; i<=32; i++) { m.appendChild(cr(i)); }
        // Last row: 5 seats
        for(let i=33; i<=37; i++) { b.appendChild(cr(i)); }
    }

    function cr(n) {
        const d = document.createElement('div');
        d.className = 'seat';
        d.innerText = n;
        d.onclick = () => {
            d.classList.toggle('selected');
            if(sl.includes(n)) sl = sl.filter(x => x !== n); else sl.push(n);
            updateTotal();
        };
        return d;
    }

    function updateTotal() {
        document.getElementById('sc').innerText = `${sl.length} SEAT(S) SELECTED`;
        document.getElementById('tp').innerText = `Rs. ${sl.length * pricePerSeat}`;
    }

    function bk() {
        if(sl.length === 0) return alert("Please select a seat!");
        const msg = `Booking for AKR EXPRESS%0ASeats: ${sl.join(', ')}%0ATotal: Rs. ${sl.length * pricePerSeat}`;
        window.open(`https://wa.me/94779998813?text=${msg}`);
    }
</script>
</body>
</html>
