<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AKR EXPRESS | Official</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --primary: #003366; --accent: #C41E3A; --bg: #f1f5f9; }
        body { font-family: 'Inter', sans-serif; margin: 0; background: var(--bg); color: #1e293b; padding-bottom: 120px; }
        header { background: #0f172a; color: white; padding: 15px; text-align: center; border-bottom: 4px solid var(--accent); }
        .lang-bar { display: flex; justify-content: center; gap: 10px; padding: 10px; background: #e2e8f0; }
        .lang-btn { padding: 5px 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 12px; font-weight: bold; }
        .container { max-width: 450px; margin: 0 auto; padding: 15px; }
        .card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        h3 { color: var(--accent); font-size: 16px; margin-top: 0; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        label { font-size: 12px; font-weight: 700; color: #64748b; display: block; margin: 10px 0 5px; }
        select, input { width: 100%; padding: 12px; border: 1px solid #cbd5e1; border-radius: 10px; box-sizing: border-box; }
        
        /* Bus Layout */
        .bus-frame { background: #fff; border: 3px solid #94a3b8; border-radius: 40px 40px 10px 10px; padding: 25px 15px; position: relative; }
        .driver-side { display: flex; justify-content: flex-end; padding-bottom: 15px; border-bottom: 2px dashed #e2e8f0; margin-bottom: 20px; }
        .steering { width: 40px; }
        .seats-container { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .seats-container div:nth-child(4n-2) { margin-right: 30px; }
        .seat { aspect-ratio: 1/1; border: 1.5px solid #64748b; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; cursor: pointer; }
        .seat.selected { background: #10b981; color: white; border-color: #059669; }
        .back-row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }

        .footer { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .book-btn { background: var(--accent); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: bold; width: 100%; cursor: pointer; }
        .price-total { font-size: 18px; font-weight: 800; color: var(--primary); }
    </style>
</head>
<body>

<header>
    <div style="font-size: 20px; font-weight: 800; letter-spacing: 1px;">AKR EXPRESS</div>
</header>

<div class="lang-bar">
    <button class="lang-btn" onclick="setLang('en')">English</button>
    <button class="lang-btn" onclick="setLang('si')">සිංහල</button>
    <button class="lang-btn" onclick="setLang('ta')">தமிழ்</button>
</div>

<div class="container">
    <div class="card">
        <h3 id="h-journey">📍 Journey Details</h3>
        <label id="l-from">FROM</label>
        <select id="f"><option>Colombo</option><option>Mannar</option></select>
        <label id="l-to">TO</label>
        <select id="t"><option>Mannar</option><option>Colombo</option></select>
    </div>

    <div class="card">
        <h3 id="h-seats">🚌 Select Your Seats</h3>
        <div class="bus-frame">
            <div class="driver-side"><img class="steering" src="https://cdn-icons-png.flaticon.com/512/744/744465.png"></div>
            <div class="seats-container" id="main-seats"></div>
            <div class="back-row" id="back-row"></div>
        </div>
    </div>
</div>

<div class="footer">
    <div style="width: 45%;">
        <div id="selected-txt" style="font-size: 10px; color: #64748b;">0 SEATS</div>
        <div class="price-total" id="total-price">Rs. 0</div>
    </div>
    <div style="width: 50%;">
        <button class="book-btn" id="btn-book" onclick="book()">WhatsApp Book</button>
    </div>
</div>

<script>
    const translations = {
        en: { journey: "Journey Details", from: "FROM", to: "TO", seats: "Select Your Seats", selected: "SEATS SELECTED", book: "WhatsApp Book" },
        si: { journey: "ගමන් විස්තර", from: "පිටත්වීම", to: "ගමනාන්තය", seats: "අසුන් තෝරාගන්න", selected: "තෝරාගත් අසුන්", book: "වෙන්කරවා ගන්න" },
        ta: { journey: "பயண விவரங்கள்", from: "இருந்து", to: "வரை", seats: "இருக்கையைத் தேர்ந்தெடுக்கவும்", selected: "தேர்ந்தெடுக்கப்பட்டவை", book: "பதிவு කරන්න" }
    };

    let selectedSeats = [];
    const pricePerSeat = 1790;

    function setLang(lang) {
        document.getElementById('h-journey').innerText = translations[lang].journey;
        document.getElementById('l-from').innerText = translations[lang].from;
        document.getElementById('l-to').innerText = translations[lang].to;
        document.getElementById('h-seats').innerText = translations[lang].seats;
        document.getElementById('btn-book').innerText = translations[lang].book;
        updateUI();
    }

    function init() {
        const main = document.getElementById('main-seats'), back = document.getElementById('back-row');
        for(let i=1; i<=32; i++) main.appendChild(createSeat(i));
        for(let i=33; i<=37; i++) back.appendChild(createSeat(i));
        setLang('si');
    }

    function createSeat(n) {
        const s = document.createElement('div');
        s.className = 'seat';
        s.innerText = n;
        s.onclick = () => {
            s.classList.toggle('selected');
            if(selectedSeats.includes(n)) selectedSeats = selectedSeats.filter(x => x !== n);
            else selectedSeats.push(n);
            updateUI();
        };
        return s;
    }

    function updateUI() {
        document.getElementById('selected-txt').innerText = `${selectedSeats.length} SEATS`;
        document.getElementById('total-price').innerText = `Rs. ${selectedSeats.length * pricePerSeat}`;
    }

    function book() {
        if(selectedSeats.length === 0) return alert("Please select a seat!");
        const msg = `AKR EXPRESS BOOKING%0ASeats: ${selectedSeats.join(', ')}%0ATotal: Rs. ${selectedSeats.length * pricePerSeat}`;
        window.open(`https://wa.me/94779998813?text=${msg}`);
    }
    init();
</script>
</body>
</html>
